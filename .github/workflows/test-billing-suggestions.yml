name: Billing Suggestions AI Accuracy

on:
  workflow_dispatch:

env:
  SECRETS_REPOSITORY: ${{ vars.SECRETS_REPOSITORY }}

jobs:
  test:
    runs-on: ubuntu-latest-4-cores
    timeout-minutes: 30
    permissions:
      id-token: write
    steps:
      - name: Install SSH Client
        uses: webfactory/ssh-agent@836c84ec59a0e7bc0eabc79988384eb567561ee2 # v0.7.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_OTTEHR_KEY }}

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - name: Resolve secrets branch
        id: resolve-secrets
        uses: ./.github/actions/resolve-secrets-branch
        with:
          core-branch: ${{ github.head_ref || github.ref_name }}
          secrets-repository: ${{ env.SECRETS_REPOSITORY }}
          ssh-key: ${{ secrets.DEPLOY_OTTEHR_KEY }}
          token: ${{ github.token }}

      - name: Check out secrets repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: ${{ env.SECRETS_REPOSITORY }}
          ssh-key: ${{ secrets.DEPLOY_OTTEHR_KEY }}
          ref: ${{ steps.resolve-secrets.outputs.branch }}
          path: secrets

      - name: Populate and validate secrets
        uses: ./.github/actions/populate-secrets
        with:
          environment: local
          aws-deploy-role: ${{ vars.AWS_DEPLOY_ROLE }}
          pull-generated-config-from-terraform-state: true

      - name: Cache node modules
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        id: npm-cache
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ runner.os }}-npm-cache-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-cache-

      - name: Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: for i in {1..3}; do npm ci && s=0 && break || s=$? && sleep 5; done; (exit $s)

      - name: Start zambda server
        run: cd packages/zambdas && npx tsx src/local-server/index.ts -- secrets=.env/zambda-secrets-local.json > /tmp/zambda.log 2>&1 &
        env:
          ENV: local

      - name: Wait for zambda server
        run: npx wait-on tcp:localhost:3000 --timeout 60000

      - name: Run billing suggestions test
        continue-on-error: true
        run: npx tsx scripts/test-billing-suggestions.ts --env local --json-out /tmp/results-billing-suggestions.json

      - name: Run billing codes test
        continue-on-error: true
        run: npx tsx scripts/test-billing-codes.ts --env local --json-out /tmp/results-billing-codes.json

      - name: Run AI suggestion notes test
        continue-on-error: true
        run: npx tsx scripts/test-ai-suggestion-note.ts --env local --json-out /tmp/results-ai-suggestion-notes.json

      - name: Run AI chatbot test
        continue-on-error: true
        run: npx tsx scripts/test-ai-chatbot.ts --env local --json-out /tmp/results-ai-chatbot.json

      - name: Upload results to S3
        if: always()
        env:
          BUCKET: ${{ vars.AI_METRICS_BUCKET }}
        run: |
          TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)

          for f in /tmp/results-*.json; do
            [ -f "$f" ] || continue
            suite=$(basename "$f" | sed 's/^results-//' | sed 's/\.json$//')
            aws s3 cp "$f" "s3://${BUCKET}/data/${TIMESTAMP}-${suite}.json"
          done

          aws s3api list-objects-v2 --bucket "${BUCKET}" --prefix "data/" \
            --output json | jq '[(.Contents // [])[] | .Key] | sort' > /tmp/manifest.json
          aws s3 cp /tmp/manifest.json "s3://${BUCKET}/manifest.json" --content-type "application/json"
          aws s3 cp scripts/ai-accuracy-dashboard.html "s3://${BUCKET}/index.html" --content-type "text/html"

      - name: Print zambda server logs
        if: always()
        run: cat /tmp/zambda.log
