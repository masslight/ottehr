# Cloud Build: Zambda API (Cloud Run) + EHR & Intake static sites (GCS).
#
# Prereqs (GCP, same project as Cloud Build):
# - Enable: Cloud Build, Cloud Run, Artifact Registry, Secret Manager, Cloud Storage
# - Artifact Registry: Docker repo `_AR_REPO` / image `_IMAGE_NAME` →
#   ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:tag
# - Secrets (version "latest"): see substitutions `_SECRET_*` below.
# - Web UI: store Vite env files (same shape as Terraform-generated apps/*/env/.env.<mode>) in
#     `_SECRET_EHR_APP_ENV` and `_SECRET_INTAKE_APP_ENV`.
#   Filenames written: apps/ehr/env/.env.${_VITE_MODE} and apps/intake/env/.env.${_VITE_MODE}.
#   Build runs `npm run build-skeleton` with ENV=${_VITE_MODE}.
#   Important: Vite forbids `--mode local` (reserved; conflicts with `.env.local`). Use
#   `production`, `staging`, `development`, etc. — not `local`.
# - GCS buckets for website hosting (Terraform infra/gcp pattern): set `_GCS_BUCKET_EHR` and
#   `_GCS_BUCKET_INTAKE` to bucket names, or leave `-` to skip upload for that app.
# - IAM: Cloud Build SA — artifactregistry.writer, run.admin, secretmanager.secretAccessor,
#   iam.serviceAccountUser on `_CLOUD_RUN_SA`; storage.objectAdmin on both buckets if uploading.
#
# Stale Cloud Run / image paths: older triggers used …/ottehr/juna-ottehr-zambdas — this file
# pushes …/juna-repo/juna-ottehr only.
#
# Image push order: push Docker image to Artifact Registry before `gcloud run deploy`.
#
# Trigger from repo root:
#   gcloud builds submit --config=deploy/cloudbuild.yaml .

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  env:
    - "DOCKER_BUILDKIT=1"

timeout: 3600s

substitutions:
  _REGION: us-central1
  _AR_REPO: juna-repo
  _IMAGE_NAME: juna-ottehr
  _CLOUD_RUN_SERVICE: juna-ottehr
  _CLOUD_RUN_SA: sa-juna-deploy@juna-dev-1.iam.gserviceaccount.com
  _SECRET_OTTEHR_CONFIG: sec-juna-ottehr-config
  _SECRET_ZAMBDA: sec-juna-ottehr-zambda-secrets
  # Vite `--mode` / `.env.<mode>` suffix — must NOT be `local` (Vite reserved).
  _VITE_MODE: staging
  _SECRET_EHR_APP_ENV: sec-juna-ottehr-app-ehr-env
  _SECRET_INTAKE_APP_ENV: sec-juna-ottehr-app-intake-env
  # Intake build-skeleton robots.txt copy (see apps/intake/package.json build:production)
  _INTAKE_ROBOTS_FILE: production
  # GCS bucket names for static hosting; use "-" to skip syncing that app
  _GCS_BUCKET_EHR: bkt-juna-ottehr-ehr-dev
  _GCS_BUCKET_INTAKE: '-'

steps:
  - id: fetch-secrets
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        mkdir -p config/.env apps/ehr/env apps/intake/env
        gcloud secrets versions access latest --secret=${_SECRET_OTTEHR_CONFIG} > config/.env/local.json
        gcloud secrets versions access latest --secret=${_SECRET_EHR_APP_ENV} > "apps/ehr/env/.env.${_VITE_MODE}"
        gcloud secrets versions access latest --secret=${_SECRET_INTAKE_APP_ENV} > "apps/intake/env/.env.${_VITE_MODE}"

  # EHR + Intake production bundles (apps/*/build)
  - id: npm-ci-build-web
    name: node:22-bookworm-slim
    waitFor:
      - fetch-secrets
    dir: .
    env:
      - "NODE_OPTIONS=--max-old-space-size=8192"
      - "HUSKY=0"
      - "CI=true"
      - "GIT_HEAD=${SHORT_SHA}"
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        npm ci
        (cd apps/ehr && ENV=${_VITE_MODE} npm run build-skeleton)
        (cd apps/intake && ENV=${_VITE_MODE} ROBOTS_FILE=${_INTAKE_ROBOTS_FILE} npm run build-skeleton)

  - id: upload-static-to-gcs
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    waitFor:
      - npm-ci-build-web
    dir: .
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        if [[ "${_GCS_BUCKET_EHR}" != "-" ]]; then
          gcloud storage rsync --recursive apps/ehr/build "gs://${_GCS_BUCKET_EHR}/" --delete-unmatched-destination-objects
        fi
        if [[ "${_GCS_BUCKET_INTAKE}" != "-" ]]; then
          gcloud storage rsync --recursive apps/intake/build "gs://${_GCS_BUCKET_INTAKE}/" --delete-unmatched-destination-objects
        fi

  - id: build-image
    name: gcr.io/cloud-builders/docker
    waitFor:
      - fetch-secrets
    dir: .
    args:
      - build
      - -f
      - deploy/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:latest
      - .
    env:
      - "DOCKER_BUILDKIT=1"

  - id: push-image
    name: gcr.io/cloud-builders/docker
    waitFor:
      - build-image
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}

  - id: deploy-cloud-run
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    waitFor:
      - push-image
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_CLOUD_RUN_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --service-account=${_CLOUD_RUN_SA}
      - --port=8080
      - --set-secrets=OTTEHR_CONFIG=${_SECRET_OTTEHR_CONFIG}:latest,ZAMBDA_SECRETS=${_SECRET_ZAMBDA}:latest
      - --set-env-vars=ENV=staging
      - --quiet
      - --allow-unauthenticated
