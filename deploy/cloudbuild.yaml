# Cloud Build: build the zambdas local API image and deploy to Cloud Run.
#
# Prereqs (GCP, same project as Cloud Build):
# - Enable: Cloud Build, Cloud Run, Artifact Registry, Secret Manager
# - Artifact Registry: Docker repository id `_AR_REPO` (default `juna-repo`) must exist in
#   `_REGION`; image name `_IMAGE_NAME` (default `juna-ottehr`). Full URI:
#   ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:tag
# - Secrets in Secret Manager (version "latest" is used):
#     sec-juna-ottehr-config      — file body = contents of config/.env/local.json
#     sec-juna-ottehr-zambda-secrets — file body of packages/zambdas/.env/zambda-secrets-local.json
#   The build step "fetch-ottehr-config-local" downloads sec-juna-ottehr-config into
#   config/.env/local.json so it is in the image context (bakes into image layers). Runtime
#   --set-secrets for OTTEHR_CONFIG can still override via docker-entrypoint.sh.
# - Grant the Cloud Build default SA (or builds SA): roles/artifactregistry.writer,
#   roles/run.admin, roles/secretmanager.secretAccessor on needed secrets;
#   roles/iam.serviceAccountUser on `_CLOUD_RUN_SA` so deploy can attach it.
#
# Image push order: `images:` is pushed only after all steps succeed. Cloud Run needs the
# image in Artifact Registry before deploy, so we run `docker push` in a dedicated step
# before `gcloud run deploy` (otherwise deploy fails with Image not found).
#
# Trigger from repo root (or set dir in trigger):
#   gcloud builds submit --config=deploy/cloudbuild.yaml .
#
# The production Ottehr path still deploys zambdas to Oystehr via Terraform; this image is
# an optional self-hosted Zambda API. Frontends in GCS/Cloud Run static still use
# generate + oystehr URLs unless you point them at this service.

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  env:
    - "DOCKER_BUILDKIT=1"

timeout: 2400s

substitutions:
  _REGION: us-central1
  # Artifact Registry Docker repo id + image name → …/REPO/IMAGE:tag (e.g. juna-repo/juna-ottehr)
  _AR_REPO: juna-repo
  _IMAGE_NAME: juna-ottehr
  # Cloud Run service id (can match image name or differ)
  _CLOUD_RUN_SERVICE: juna-ottehr
  # Runtime service account for the Cloud Run revision (secret access, GCP APIs, etc.)
  _CLOUD_RUN_SA: sa-juna-deploy@juna-dev-1.iam.gserviceaccount.com
  _SECRET_OTTEHR_CONFIG: sec-juna-ottehr-config
  _SECRET_ZAMBDA: sec-juna-ottehr-zambda-secrets

steps:
  - id: fetch-ottehr-config-local
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        mkdir -p config/.env
        gcloud secrets versions access latest --secret=${_SECRET_OTTEHR_CONFIG} > config/.env/local.json

  - id: build-image
    name: gcr.io/cloud-builders/docker
    waitFor:
      - fetch-ottehr-config-local
    dir: .
    args:
      - build
      - -f
      - deploy/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:latest
      - .
    env:
      - "DOCKER_BUILDKIT=1"

  # Must run before deploy — Artifact Registry does not have the image until push completes.
  - id: push-image
    name: gcr.io/cloud-builders/docker
    waitFor:
      - build-image
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}

  - id: deploy-cloud-run
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    waitFor:
      - push-image
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_CLOUD_RUN_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --service-account=${_CLOUD_RUN_SA}
      - --port=8080
      - --set-secrets=OTTEHR_CONFIG=${_SECRET_OTTEHR_CONFIG}:latest,ZAMBDA_SECRETS=${_SECRET_ZAMBDA}:latest
      - --set-env-vars=ENV=local
      - --quiet
      - --allow-unauthenticated
